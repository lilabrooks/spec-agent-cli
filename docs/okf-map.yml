# Map source areas to the specs and ADRs that govern them. `scripts/okf
# check-stale` uses this file to catch cases where source changed but the
# mapped knowledge file was not touched.
#
# Mappings are mined from each spec's `components:` frontmatter plus the ADRs
# that decided the area's shape. Keep patterns repo-relative and quoted.
#
# No `layout:` block: this repo already uses the default tree (docs/specs,
# docs/adr, stamp in docs/index.md); only filename prefixes differ, which the
# kit helpers tolerate (kit ADR 0019).

mappings:
  - source: "src/agent_cli/cli.py"
    docs:
      - "docs/specs/spec-001-cli-command-surface.md"
      - "docs/specs/spec-006-build-file-output.md"

  - source: "src/agent_cli/core/parser.py"
    docs:
      - "docs/specs/spec-001-cli-command-surface.md"

  - source: "src/agent_cli/agents/**"
    docs:
      - "docs/specs/spec-002-agent-core.md"
      - "docs/adr/adr-0002-hexagonal-architecture.md"

  - source: "src/agent_cli/core/messages.py"
    docs:
      - "docs/specs/spec-002-agent-core.md"

  - source: "src/agent_cli/core/models.py"
    docs:
      - "docs/specs/spec-002-agent-core.md"

  - source: "src/agent_cli/core/ports.py"
    docs:
      - "docs/specs/spec-002-agent-core.md"
      - "docs/adr/adr-0003-language-model-protocol-and-registry.md"

  - source: "src/agent_cli/runtime/**"
    docs:
      - "docs/specs/spec-002-agent-core.md"

  - source: "src/agent_cli/providers/**"
    docs:
      - "docs/specs/spec-003-provider-adapters.md"
      - "docs/adr/adr-0003-language-model-protocol-and-registry.md"

  - source: "src/agent_cli/config/**"
    docs:
      - "docs/specs/spec-004-configuration.md"
      - "docs/adr/adr-0008-env-var-configuration.md"

  - source: "src/agent_cli/core/markdown.py"
    docs:
      - "docs/specs/spec-005-markdown-document-system.md"
      - "docs/adr/adr-0005-markdown-with-minimal-parser.md"

  - source: "src/agent_cli/specs/**"
    docs:
      - "docs/specs/spec-005-markdown-document-system.md"

  - source: "src/agent_cli/skills/**"
    docs:
      - "docs/specs/spec-005-markdown-document-system.md"

  - source: "src/agent_cli/core/fileset.py"
    docs:
      - "docs/specs/spec-006-build-file-output.md"
      - "docs/adr/adr-0006-file-block-output-contract.md"
      - "docs/adr/adr-0009-safe-by-default-build-writes.md"

  - source: "skills/**"
    docs:
      - "docs/specs/spec-006-build-file-output.md"
      - "docs/adr/adr-0007-bundle-specs-skills-in-wheel.md"

  - source: "specs/**"
    docs:
      - "docs/specs/spec-005-markdown-document-system.md"
      - "docs/adr/adr-0007-bundle-specs-skills-in-wheel.md"

  - source: "src/agent_cli/resources.py"
    docs:
      - "docs/specs/spec-007-resource-resolution.md"
      - "docs/adr/adr-0007-bundle-specs-skills-in-wheel.md"

  - source: "pyproject.toml"
    docs:
      - "docs/specs/spec-000-project-objective.md"
      - "docs/specs/spec-007-resource-resolution.md"
      - "docs/specs/spec-008-repository-health.md"
      - "docs/adr/adr-0004-zero-runtime-dependencies.md"

  - source: "README.md"
    docs:
      - "docs/specs/spec-000-project-objective.md"

  - source: "requirements.txt"
    docs:
      - "docs/specs/spec-008-repository-health.md"

  - source: "CHANGELOG.md"
    docs:
      - "docs/specs/spec-008-repository-health.md"

  - source: "Makefile"
    docs:
      - "docs/specs/spec-008-repository-health.md"

  - source: ".github/workflows/**"
    docs:
      - "docs/specs/spec-008-repository-health.md"
      - "docs/adr/adr-0011-provider-sdks-in-ci.md"

  - source: "tests/test_repo_health.py"
    docs:
      - "docs/specs/spec-008-repository-health.md"

  - source: "scripts/check-okf-docs.py"
    docs:
      - "docs/specs/spec-008-repository-health.md"
      - "docs/adr/adr-0010-okf-docs-validation.md"
