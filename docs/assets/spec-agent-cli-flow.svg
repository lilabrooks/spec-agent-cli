<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="280" viewBox="0 0 1180 280" role="img" aria-labelledby="title desc">
  <title id="title">Spec Agent CLI flow</title>
  <desc id="desc">Markdown CLI specs and agent skills become an agent prompt, Python CLI code, quality checks, package artifacts, and a pipx-installed CLI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4f67"/>
    </marker>
    <style>
      .background { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #8da2c0; stroke-width: 2; rx: 12; }
      .box-accent { fill: #eef6ff; stroke: #4f7db8; stroke-width: 2; rx: 12; }
      .box-success { fill: #eefbf3; stroke: #4e9a67; stroke-width: 2; rx: 12; }
      .title { fill: #172033; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; }
      .detail { fill: #43516a; font-family: Arial, Helvetica, sans-serif; font-size: 13px; }
      .arrow { stroke: #3f4f67; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1180" height="280" rx="18"/>

  <rect class="box-accent" x="30" y="82" width="140" height="96"/>
  <text class="title" x="100" y="116" text-anchor="middle">Markdown spec</text>
  <text class="detail" x="100" y="141" text-anchor="middle">specs/cli/*.md</text>

  <rect class="box-accent" x="200" y="82" width="140" height="96"/>
  <text class="title" x="270" y="116" text-anchor="middle">Agent skills</text>
  <text class="detail" x="270" y="141" text-anchor="middle">skills/agent/*.md</text>

  <rect class="box" x="370" y="82" width="150" height="96"/>
  <text class="title" x="445" y="111" text-anchor="middle">Agent prompt</text>
  <text class="detail" x="445" y="136" text-anchor="middle">agent run --spec</text>
  <text class="detail" x="445" y="156" text-anchor="middle">--skill</text>

  <rect class="box" x="550" y="82" width="160" height="96"/>
  <text class="title" x="630" y="111" text-anchor="middle">Python CLI code</text>
  <text class="detail" x="630" y="136" text-anchor="middle">src/agent_cli/</text>
  <text class="detail" x="630" y="156" text-anchor="middle">commands/*.py</text>

  <rect class="box" x="740" y="82" width="140" height="96"/>
  <text class="title" x="810" y="111" text-anchor="middle">Quality gate</text>
  <text class="detail" x="810" y="136" text-anchor="middle">pytest</text>
  <text class="detail" x="810" y="156" text-anchor="middle">Ruff + mypy</text>

  <rect class="box" x="910" y="82" width="120" height="96"/>
  <text class="title" x="970" y="111" text-anchor="middle">Artifact</text>
  <text class="detail" x="970" y="136" text-anchor="middle">wheel</text>
  <text class="detail" x="970" y="156" text-anchor="middle">sdist</text>

  <rect class="box-success" x="1060" y="82" width="90" height="96"/>
  <text class="title" x="1105" y="116" text-anchor="middle">pipx</text>
  <text class="detail" x="1105" y="141" text-anchor="middle">my-cli</text>

  <path class="arrow" d="M 170 130 L 192 130"/>
  <path class="arrow" d="M 340 130 L 362 130"/>
  <path class="arrow" d="M 520 130 L 542 130"/>
  <path class="arrow" d="M 710 130 L 732 130"/>
  <path class="arrow" d="M 880 130 L 902 130"/>
  <path class="arrow" d="M 1030 130 L 1052 130"/>
</svg>
