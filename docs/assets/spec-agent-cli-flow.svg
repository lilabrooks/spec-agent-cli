<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="300" viewBox="0 0 1250 300" role="img" aria-labelledby="title desc">
  <title id="title">Spec Agent CLI flow</title>
  <desc id="desc">A Markdown spec from any path, agent skills including the file-output contract, and a chosen provider and model become an agent prompt via agent build, which is parsed into FILE: blocks, previewed, then written to disk as a real generated CLI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4f67"/>
    </marker>
    <style>
      .background { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #8da2c0; stroke-width: 2; rx: 12; }
      .box-accent { fill: #eef6ff; stroke: #4f7db8; stroke-width: 2; rx: 12; }
      .box-success { fill: #eefbf3; stroke: #4e9a67; stroke-width: 2; rx: 12; }
      .title { fill: #172033; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
      .detail { fill: #43516a; font-family: Arial, Helvetica, sans-serif; font-size: 12.5px; }
      .arrow { stroke: #3f4f67; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .caption { fill: #6b7891; font-family: Arial, Helvetica, sans-serif; font-size: 11.5px; font-style: italic; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1250" height="300" rx="18"/>

  <rect class="box-accent" x="20" y="95" width="140" height="110"/>
  <text class="title" x="90" y="133" text-anchor="middle">Markdown spec</text>
  <text class="detail" x="90" y="158" text-anchor="middle">any path on disk</text>
  <text class="detail" x="90" y="178" text-anchor="middle">--spec</text>

  <rect class="box-accent" x="182" y="95" width="160" height="110"/>
  <text class="title" x="262" y="133" text-anchor="middle">Agent skills</text>
  <text class="detail" x="262" y="158" text-anchor="middle">skills/agent/*.md</text>
  <text class="detail" x="262" y="178" text-anchor="middle">+ output contract</text>

  <rect class="box" x="364" y="95" width="170" height="110"/>
  <text class="title" x="449" y="133" text-anchor="middle">Provider + model</text>
  <text class="detail" x="449" y="158" text-anchor="middle">echo/anthropic/openai</text>
  <text class="detail" x="449" y="178" text-anchor="middle">AGENT_CLI_MODEL</text>

  <rect class="box" x="556" y="95" width="150" height="110"/>
  <text class="title" x="631" y="133" text-anchor="middle">Agent prompt</text>
  <text class="detail" x="631" y="158" text-anchor="middle">agent build</text>
  <text class="detail" x="631" y="178" text-anchor="middle">--spec --skill</text>

  <rect class="box" x="728" y="95" width="150" height="110"/>
  <text class="title" x="803" y="133" text-anchor="middle">Parsed output</text>
  <text class="detail" x="803" y="158" text-anchor="middle">core/fileset.py</text>
  <text class="detail" x="803" y="178" text-anchor="middle">FILE: blocks</text>

  <rect class="box" x="900" y="95" width="150" height="110"/>
  <text class="title" x="975" y="133" text-anchor="middle">Write, guarded</text>
  <text class="detail" x="975" y="158" text-anchor="middle">--apply --force</text>
  <text class="detail" x="975" y="178" text-anchor="middle">plan preview first</text>

  <rect class="box-success" x="1072" y="95" width="150" height="110"/>
  <text class="title" x="1147" y="133" text-anchor="middle">Generated CLI</text>
  <text class="detail" x="1147" y="158" text-anchor="middle">pipx</text>
  <text class="detail" x="1147" y="178" text-anchor="middle">installable</text>

  <path class="arrow" d="M 160 150 L 180 150"/>
  <path class="arrow" d="M 342 150 L 362 150"/>
  <path class="arrow" d="M 534 150 L 554 150"/>
  <path class="arrow" d="M 706 150 L 726 150"/>
  <path class="arrow" d="M 878 150 L 898 150"/>
  <path class="arrow" d="M 1050 150 L 1070 150"/>

  <text class="caption" x="610" y="230" text-anchor="middle">Spec, skills, provider, and model are independent choices — swap any one without touching the others.</text>
</svg>
