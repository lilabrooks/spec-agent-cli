name: Snyk

# Requires a SNYK_TOKEN repository secret (Settings > Secrets and variables >
# Actions). Get it from https://app.snyk.io > Account settings > Auth Token.
#
# On pull requests this gates changes on Open Source + Code findings. On pushes
# to main it also runs `snyk monitor`, which refreshes the Snyk dashboard
# snapshot so it stops reporting vulnerabilities that have already been fixed.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Open Source test
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=low --skip-unresolved=true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test
        run: snyk code test --severity-threshold=low
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk monitor (refresh dashboard)
        # Pin --project-name so every run updates one stable project. Without it,
        # snyk monitor keys the project on the ephemeral runner hostname and
        # spawns a new dashboard project on every push to main.
        if: github.ref == 'refs/heads/main'
        run: snyk monitor --file=requirements.txt --package-manager=pip --project-name=spec-agent-cli
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
